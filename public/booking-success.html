<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Successful - Bus Booking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-success text-white">
                        <h3 class="text-center">
                            <i class="fas fa-check-circle"></i> Booking Successful!
                        </h3>
                    </div>
                    <div class="card-body">
                        <div class="text-center mb-4">
                            <div class="success-icon">
                                <i class="fas fa-check-circle fa-5x text-success"></i>
                            </div>
                            <h4 class="mt-3">Your bus ticket has been booked successfully!</h4>
                            <p class="text-muted">A confirmation email has been sent to your registered email address.</p>
                        </div>

                        <div class="booking-confirmation">
                            <h5>Booking Details</h5>
                            <div id="confirmation-details">
                                <!-- This will be populated by JavaScript -->
                            </div>
                        </div>

                        <div class="mt-4 text-center">
                            <button onclick="window.print()" class="btn btn-outline-primary me-2">
                                <i class="fas fa-print"></i> Print Ticket
                            </button>
                            <a href="index.html" class="btn btn-primary">
                                <i class="fas fa-home"></i> Back to Home
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Get booking confirmation data
        function getBookingConfirmation() {
            // Try to get from localStorage
            const stored = localStorage.getItem('bookingConfirmation');
            if (stored) {
                return JSON.parse(stored);
            }
            
            // Fallback data
            return {
                bookingId: 'BK' + Date.now(),
                busDetails: {
                    busNumber: 'BUS-001',
                    route: 'Delhi to Mumbai',
                    departureTime: '2024-01-15 08:00 AM',
                    arrivalTime: '2024-01-15 08:00 PM',
                    seats: ['A1', 'A2']
                },
                customerDetails: {
                    name: 'John Doe',
                    email: 'john@example.com',
                    phone: '+91 9876543210'
                },
                amount: 1200,
                paymentId: 'pay_' + Math.random().toString(36).substr(2, 9)
            };
        }

        // Display booking confirmation
        function displayBookingConfirmation() {
            const booking = getBookingConfirmation();
            const detailsContainer = document.getElementById('confirmation-details');
            
            detailsContainer.innerHTML = `
                <div class="row">
                    <div class="col-md-6">
                        <p><strong>Booking ID:</strong> ${booking.bookingId}</p>
                        <p><strong>Bus Number:</strong> ${booking.busDetails.busNumber}</p>
                        <p><strong>Route:</strong> ${booking.busDetails.route}</p>
                        <p><strong>Departure:</strong> ${booking.busDetails.departureTime}</p>
                    </div>
                    <div class="col-md-6">
                        <p><strong>Arrival:</strong> ${booking.busDetails.arrivalTime}</p>
                        <p><strong>Seats:</strong> ${booking.busDetails.seats.join(', ')}</p>
                        <p><strong>Passenger:</strong> ${booking.customerDetails.name}</p>
                        <p><strong>Amount Paid:</strong> ₹${booking.amount.toFixed(2)}</p>
                    </div>
                </div>
                <hr>
                <div class="row">
                    <div class="col-md-6">
                        <p><strong>Email:</strong> ${booking.customerDetails.email}</p>
                    </div>
                    <div class="col-md-6">
                        <p><strong>Phone:</strong> ${booking.customerDetails.phone}</p>
                    </div>
                </div>
                <div class="alert alert-info mt-3">
                    <strong>Payment ID:</strong> ${booking.paymentId}
                </div>
            `;
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            displayBookingConfirmation();
        });
    </script>
</body>
</html>
