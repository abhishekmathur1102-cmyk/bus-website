<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings - ShreeBhawaniTravels</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-gray-50 min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-lg sticky top-0 z-50">
        <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center cursor-pointer" onclick="window.location.href='/'">
                    <i class="fas fa-bus text-2xl text-blue-600 mr-2"></i>
                    <span class="text-xl font-bold text-gray-800">ShreeBhawaniTravels</span>
                </div>
                <div class="hidden md:flex space-x-8">
                    <a href="/" class="text-gray-700 hover:text-blue-600 transition-colors">Home</a>
                    <button id="nav-logout-btn" class="text-red-600 hover:text-red-700 transition-colors flex items-center">
                        <i class="fas fa-sign-out-alt mr-1"></i>Logout
                    </button>
                </div>
            </div>
        </nav>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900">My Bookings</h1>
            <p class="text-gray-600 mt-2">Manage and view your past journeys with us.</p>
        </div>

        <div id="bookings-container" class="space-y-6">
            <!-- Loading State -->
            <div id="loading-state" class="text-center py-20">
                <i class="fas fa-spinner fa-spin text-4xl text-blue-600 mb-4"></i>
                <p class="text-gray-500">Fetching your dream journeys...</p>
            </div>
            
            <!-- Empty State (Hidden) -->
            <div id="empty-state" class="hidden text-center py-20 bg-white rounded-2xl shadow-sm border border-gray-100">
                <i class="fas fa-calendar-times text-6xl text-gray-200 mb-4"></i>
                <p class="text-xl font-semibold text-gray-800">No bookings found</p>
                <p class="text-gray-500 mt-2">You haven't booked any trips yet. Start your journey today!</p>
                <a href="/" class="inline-block mt-6 bg-blue-600 text-white px-8 py-3 rounded-xl font-semibold hover:bg-blue-700 transition-colors">Book Now</a>
            </div>

            <!-- Bookings List -->
            <div id="bookings-list" class="grid grid-cols-1 gap-6">
                <!-- Trip Card Template (Generated by JS) -->
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/';
                return;
            }

            // Logout Logic
            document.getElementById('nav-logout-btn').addEventListener('click', () => {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.href = '/';
            });

            try {
                const response = await fetch('/api/bookings/my', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                const result = await response.json();

                document.getElementById('loading-state').classList.add('hidden');

                if (result.success && result.data.length > 0) {
                    const list = document.getElementById('bookings-list');
                    result.data.forEach(booking => {
                        const card = document.createElement('div');
                        card.className = 'bg-white rounded-2xl shadow-sm border border-gray-100 p-6 hover:shadow-md transition-shadow';
                        
                        const date = new Date(booking.createdAt).toLocaleDateString(undefined, { 
                            year: 'numeric', month: 'long', day: 'numeric' 
                        });

                        const statusClass = booking.status === 'paid' ? 'bg-green-100 text-green-700' : 
                                           booking.status === 'created' ? 'bg-yellow-100 text-yellow-700' : 
                                           'bg-red-100 text-red-700';

                        card.innerHTML = `
                            <div class="flex flex-col md:flex-row justify-between items-start md:items-center">
                                <div class="flex-1">
                                    <div class="flex items-center space-x-3 mb-2">
                                        <span class="px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider ${statusClass}">
                                            ${booking.status}
                                        </span>
                                        <span class="text-sm text-gray-400">#${booking.razorpayOrderId.slice(-8)}</span>
                                    </div>
                                    <h3 class="text-xl font-bold text-gray-800">${booking.busDetails.route}</h3>
                                    <p class="text-gray-500 text-sm mt-1">
                                        <i class="far fa-calendar-alt mr-1"></i> Booked on ${date}
                                    </p>
                                </div>
                                <div class="mt-4 md:mt-0 text-right">
                                    <p class="text-2xl font-bold text-blue-600">₹${booking.amount.toLocaleString()}</p>
                                    <p class="text-sm text-gray-500">${booking.busDetails.seats[0]}</p>
                                </div>
                            </div>
                        `;
                        list.appendChild(card);
                    });
                } else {
                    document.getElementById('empty-state').classList.remove('hidden');
                }
            } catch (error) {
                console.error('Fetch bookings error:', error);
                alert('Failed to load bookings. Please try again.');
            }
        });
    </script>
</body>

</html>
